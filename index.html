<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Condominio Manzoni - Analisi Triennale</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --warning: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .slider-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
        input[type=range] { width: 100%; margin-bottom: 10px; }
        .admin-card { border-left: 8px solid #cbd5e0; transition: transform 0.2s; cursor: pointer; }
        .admin-card.winner { border-left-color: var(--accent); background: #f0fff4; }
        .admin-card h2 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .price-tag { font-size: 1.8rem; color: var(--primary); font-weight: 800; }
        .monthly { font-size: 1.1rem; color: #4a5568; margin-bottom: 15px; }
        .details { display: none; padding-top: 15px; border-top: 1px solid #edf2f7; font-size: 0.95rem; }
        .details.active { display: block; }
        .breakdown-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .breakdown-table th, .breakdown-table td { text-align: left; padding: 8px; border-bottom: 1px solid #e2e8f0; }
        .page-ref { color: #718096; font-size: 0.8rem; font-style: italic; }
        .download-btn { display: inline-block; background: #3182ce; color: white; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: bold; margin-top: 15px; }
        .download-btn:hover { background: #2b6cb0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="text-align:center">Simulatore Spesa Triennale</h1>
            <p style="text-align:center; color:#718096;">Dati estratti dai preventivi ufficiali</p>
            
            <div class="slider-group">
                <label id="labelUnita">Unità Immobiliari: 45</label>
                <input type="range" id="unita" min="10" max="100" step="1" value="45">
            </div>
            <div class="slider-group">
                <label id="labelLavori">Lavori Straordinari Previsti: € 160.000</label>
                <input type="range" id="lavori" min="0" max="500000" step="10000" value="160000">
            </div>
            <div class="slider-group">
                <label id="labelAssemblee">Numero Assemblee Annue: 4</label>
                <input type="range" id="assemblee" min="1" max="10" step="1" value="4">
            </div>
            <div class="slider-group">
                <label id="labelOra">Orario termine assemblea: 20:00</label>
                <input type="range" id="ora" min="15" max="24" step="1" value="20">
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const pdfBase64 = {
            micarelli: "", 
            sciarra: "",
            lucresi: "",
            mb: ""
        };

        function update() {
            const unita = parseInt(document.getElementById('unita').value);
            const lavori = parseInt(document.getElementById('lavori').value);
            const numAss = parseInt(document.getElementById('assemblee').value);
            const ora = parseInt(document.getElementById('ora').value);
            const anni = 3;

            document.getElementById('labelUnita').innerText = `Unità Immobiliari: ${unita}`;
            document.getElementById('labelLavori').innerText = `Lavori Straordinari Previsti: € ${lavori.toLocaleString('it-IT')}`;
            document.getElementById('labelAssemblee').innerText = `Numero Assemblee Annue: ${numAss}`;
            document.getElementById('labelOra').innerText = `Orario termine assemblea: ${ora}:00`;

            const admins = [
                {
                    name: "Mario Micarelli",
                    base: 3800 * anni, baseStr: "€ 3.800/anno", baseRef: "Pag. 2",
                    lavori: lavori * 0.02, lavoriStr: "2% su importo", lavoriRef: "Pag. 2",
                    fisco: 160 * anni, fiscoStr: "€ 160/anno fiscalità", fiscoRef: "Pag. 2",
                    extraAss: (numAss > 2 ? (numAss - 2) * 150 * anni : 0), assStr: "2 incluse, extra € 150", assRef: "Pag. 2",
                    penale: 0,
                    pdfId: "micarelli"
                },
                {
                    name: "Claudio Sciarra",
                    base: 3500 * anni, baseStr: "€ 3.500/anno", baseRef: "Pag. 1",
                    lavori: lavori * 0.03, lavoriStr: "3% su importo", lavoriRef: "Pag. 3",
                    fisco: ((200) + (55) + (unita * 25)) * anni, fiscoStr: "Fisco, Cancelleria, Utenze (€25/cad)", fiscoRef: "Pag. 3",
                    penale: (ora > 19 ? 300 * numAss * anni : 0),
                    extraAss: (numAss > 2 ? (numAss - 2) * 100 * anni : 0), assStr: "2 incluse, extra € 100", assRef: "Pag. 3",
                    pdfId: "sciarra",
                    alert: ora > 19 ? "PENALE ORARIA ATTIVA: € 300 per assemblea (Rif. Pag. 3)" : ""
                },
                {
                    name: "Massimo Lucresi",
                    base: (3850 * anni) * 1.04, baseStr: "€ 3.850/anno + 4% INPS", baseRef: "Pag. 2",
                    lavori: (lavori * 0.02) * 1.04, lavoriStr: "2% + 4% INPS", lavoriRef: "Pag. 2",
                    fisco: ((300) + (150) + (unita * 25)) * anni * 1.04, fiscoStr: "Fisco, Forfait, Utenze + 4% INPS", fiscoRef: "Pag. 2",
                    extraAss: (numAss > 2 ? (numAss - 2) * 70 * anni * 1.04 : 0), assStr: "2 incluse, extra € 70 + INPS", assRef: "Pag. 2",
                    penale: 0,
                    pdfId: "lucresi"
                },
                {
                    name: "Studio MB (Basile)",
                    base: (4000 + 666) * anni * 1.22, baseStr: "€ 4.000 + 666 spese + 22% IVA", baseRef: "Pag. 4",
                    lavori: (lavori * 0.02) * 1.22, lavoriStr: "2% + 22% IVA", lavoriRef: "Pag. 5",
                    fisco: ((125) + (unita * 35)) * anni * 1.22, fiscoStr: "Fisco e Utenze + 22% IVA", fiscoRef: "Pag. 4",
                    extraAss: (numAss > 1 ? (numAss - 1) * 100 * anni * 1.22 : 0), assStr: "1 inclusa, extra € 100 + IVA", assRef: "Pag. 4",
                    penale: 0,
                    pdfId: "mb"
                }
            ];

            admins.forEach(a => {
                a.total = (a.base || 0) + (a.lavori || 0) + (a.fisco || 0) + (a.penale || 0) + (a.extraAss || 0);
            });

            admins.sort((a, b) => a.total - b.total);

            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';

            admins.forEach((a, i) => {
                const card = document.createElement('div');
                card.className = `card admin-card ${i === 0 ? 'winner' : ''}`;
                const mensile = (a.total / anni / unita / 12).toFixed(2);
                
                let html = `
                    <h2>${a.name} ${i === 0 ? '🏆' : ''} <span class="price-tag">€ ${Math.round(a.total).toLocaleString('it-IT')}</span></h2>
                    <div class="monthly">Quota mensile media a famiglia: <b>€ ${mensile.replace('.', ',')}</b></div>
                    ${a.alert ? `<div style="color:#e74c3c; font-weight:bold; margin-bottom:10px;">🚨 ${a.alert}</div>` : ''}
                    <div class="details" id="details-${i}">
                        <table class="breakdown-table">
                            <tr>
                                <td><b>Onorario Base</b><br><span class="page-ref">${a.baseStr} (${a.baseRef})</span></td>
                                <td>€ ${Math.round(a.base).toLocaleString('it-IT')}</td>
                            </tr>
                            <tr>
                                <td><b>Lavori Straordinari</b><br><span class="page-ref">${a.lavoriStr} (${a.lavoriRef})</span></td>
                                <td>€ ${Math.round(a.lavori).toLocaleString('it-IT')}</td>
                            </tr>
                            <tr>
                                <td><b>Costi Fissi/Utenze</b><br><span class="page-ref">${a.fiscoStr} (${a.fiscoRef})</span></td>
                                <td>€ ${Math.round(a.fisco).toLocaleString('it-IT')}</td>
                            </tr>
                            <tr>
                                <td><b>Assemblee / Penali</b><br><span class="page-ref">${a.assStr} (${a.assRef})</span></td>
                                <td>€ ${Math.round((a.extraAss || 0) + (a.penale || 0)).toLocaleString('it-IT')}</td>
                            </tr>
                        </table>
                        ${pdfBase64[a.pdfId] ? `<a href="${pdfBase64[a.pdfId]}" download="Preventivo_${a.name.replace(' ', '_')}.pdf" class="download-btn">⬇️ Scarica PDF Originale</a>` : `<span style="font-size: 0.8rem; color: #a0aec0; display:block; margin-top:10px;"></span>`}
                    </div>
                    <div style="text-align:right; font-size:0.8rem; color:#718096; margin-top:10px; user-select:none;">Clicca per i dettagli 🔽</div>
                `;
                card.innerHTML = html;
                card.onclick = (e) => {
                    if(e.target.tagName !== 'A') {
                        document.getElementById(`details-${i}`).classList.toggle('active');
                    }
                };
                resDiv.appendChild(card);
            });
        }

        document.getElementById('unita').addEventListener('input', update);
        document.getElementById('lavori').addEventListener('input', update);
        document.getElementById('assemblee').addEventListener('input', update);
        document.getElementById('ora').addEventListener('input', update);
        update();
    </script>
</body>
</html>
