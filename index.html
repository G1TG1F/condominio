<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Condominio Manzoni - Analisi Triennale</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --warning: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .slider-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
        input[type=range] { width: 100%; margin-bottom: 10px; }
        .admin-card { border-left: 8px solid #cbd5e0; transition: transform 0.2s; cursor: pointer; }
        .admin-card.winner { border-left-color: var(--accent); background: #f0fff4; }
        .admin-card h2 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .price-tag { font-size: 1.8rem; color: var(--primary); font-weight: 800; }
        .monthly { font-size: 1.1rem; color: #4a5568; margin-bottom: 15px; }
        .details { display: none; padding-top: 15px; border-top: 1px solid #edf2f7; font-size: 0.95rem; }
        .details.active { display: block; }
        .alert { color: var(--warning); font-weight: bold; font-size: 0.9rem; margin-top: 10px; border: 1px solid var(--warning); padding: 5px; border-radius: 4px; display: inline-block; }
        .badge { background: #edf2f7; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; }
        .pro-con { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pro { color: #2f855a; font-size: 0.85rem; }
        .con { color: #c53030; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="text-align:center">Piano di Spesa Triennale</h1>
            <div class="slider-group">
                <label id="labelLavori">Lavori Straordinari: € 160.000</label>
                <input type="range" id="lavori" min="0" max="500000" step="10000" value="160000">
            </div>
            <div class="slider-group">
                <label id="labelAssemblee">Assemblee/anno: 4</label>
                <input type="range" id="assemblee" min="1" max="10" step="1" value="4">
            </div>
            <div class="slider-group">
                <label id="labelOra">Orario fine assemblea: 20:00</label>
                <input type="range" id="ora" min="15" max="24" step="1" value="20">
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function update() {
            const lavori = parseInt(document.getElementById('lavori').value);
            const numAss = parseInt(document.getElementById('assemblee').value);
            const ora = parseInt(document.getElementById('ora').value);
            const unita = 45;
            const anni = 3;

            document.getElementById('labelLavori').innerText = `Lavori Straordinari: € ${lavori.toLocaleString()}`;
            document.getElementById('labelAssemblee').innerText = `Assemblee/anno: ${numAss}`;
            document.getElementById('labelOra').innerText = `Orario fine assemblea: ${ora}:00`;

            const admins = [
                {
                    name: "Mario Micarelli",
                    base: 3800 * anni,
                    lavori: lavori * 0.02,
                    fisco: 160 * anni,
                    extraAss: (numAss > 2 ? (numAss - 2) * 150 * anni : 0),
                    pros: ["Pareri legali/tecnici GRATIS", "Reperibilità h24", "Sito web dedicato"],
                    cons: ["Sito semplice, non app"],
                    note: ""
                },
                {
                    name: "Claudio Sciarra",
                    base: 3500 * anni,
                    lavori: lavori * 0.03, // Onesto: solo gestione 3%
                    fisco: (200 * anni) + (55 * anni),
                    utenze: (unita * 25 * anni),
                    penale: (ora > 19 ? 300 * numAss * anni : 0),
                    extraAss: (numAss > 2 ? (numAss - 2) * 100 * anni : 0),
                    pros: ["Uso Google Meet", "App MioCondominio"],
                    cons: ["Penale oraria 300€", "3% lavori (il più caro)", "Rapporto parentela"],
                    note: ora > 19 ? "ATTENZIONE: Penale 300€/ora attiva" : ""
                },
                {
                    name: "Massimo Lucresi",
                    base: (3850 * anni) * 1.04,
                    lavori: (lavori * 0.02) * 1.04,
                    fisco: (300 * anni) * 1.04,
                    utenze: (unita * 25 * anni) * 1.04,
                    extraAss: (numAss > 2 ? (numAss - 2) * 70 * anni) * 1.04 : 0,
                    spese: (150 * anni) * 1.04,
                    pros: ["Gratis piccoli lavori (<1k)", "Certificazione ISO 9001"],
                    cons: ["INPS 4% su ogni voce", "Costi fiscali alti"],
                    note: ""
                },
                {
                    name: "Studio MB (Basile)",
                    base: (4000 + 666) * anni * 1.22,
                    lavori: (lavori * 0.02) * 1.22,
                    fisco: (125 * anni) * 1.22,
                    utenze: (unita * 35 * anni) * 1.22,
                    extraAss: (numAss > 1 ? (numAss - 1) * 100 * anni) * 1.22 : 0,
                    pros: ["Struttura con 5 collaboratori", "Esperienza post-sisma"],
                    cons: ["Il più caro del lotto", "IVA 22% obbligatoria"],
                    note: ""
                }
            ];

            admins.forEach(a => {
                a.total = (a.base || 0) + (a.lavori || 0) + (a.fisco || 0) + (a.utenze || 0) + (a.penale || 0) + (a.extraAss || 0) + (a.spese || 0);
            });

            admins.sort((a, b) => a.total - b.total);

            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';

            admins.forEach((a, i) => {
                const card = document.createElement('div');
                card.className = `card admin-card ${i === 0 ? 'winner' : ''}`;
                const mensile = (a.total / anni / unita / 12).toFixed(2);
                
                card.innerHTML = `
                    <h2>${a.name} ${i === 0 ? '🏆' : ''} <span class="price-tag">€ ${Math.round(a.total).toLocaleString()}</span></h2>
                    <div class="monthly">Quota mensile media: <b>€ ${mensile}</b></div>
                    ${a.note ? `<div class="alert">${a.note}</div>` : ''}
                    <div class="details" id="details-${i}">
                        <p><b>Dettaglio analitico (3 anni):</b></p>
                        <ul>
                            <li>Compenso Base: € ${Math.round(a.base || 0).toLocaleString()}</li>
                            <li>Gestione Lavori: € ${Math.round(a.lavori || 0).toLocaleString()}</li>
                            <li>Fisco e Utenze: € ${Math.round((a.fisco || 0) + (a.utenze || 0) + (a.spese || 0)).toLocaleString()}</li>
                            <li>Assemblee/Penali: € ${Math.round((a.extraAss || 0) + (a.penale || 0)).toLocaleString()}</li>
                        </ul>
                        <div class="pro-con">
                            <div class="pro"><b>PRO:</b><br>${a.pros.join('<br>')}</div>
                            <div class="con"><b>CONTRO:</b><br>${a.cons.join('<br>')}</div>
                        </div>
                    </div>
                    <div style="text-align:right; font-size:0.8rem; color:#718096; margin-top:10px">Clicca per dettagli</div>
                `;
                card.onclick = () => document.getElementById(`details-${i}`).classList.toggle('active');
                resDiv.appendChild(card);
            });
        }

        document.getElementById('lavori').addEventListener('input', update);
        document.getElementById('assemblee').addEventListener('input', update);
        document.getElementById('ora').addEventListener('input', update);
        update();
    </script>
</body>
</html>
